{{ define "main" }}
<content>
  <ul class="blog-posts">
    {{ range .Data.Terms.Alphabetical }}
    <li>
      <span>
        <i>{{ .Count }} posts</i>
      </span>
      <a href="{{ .Page.Permalink }}">#{{ .Page.Title }}</a>
    </li>
    {{ else }}
    <li>No tags yet</li>
    {{ end }}
  </ul>
</content>
{{ end }}
